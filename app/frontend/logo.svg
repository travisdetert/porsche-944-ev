<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" width="620" height="180" font-family="system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2a2a"/><stop offset="1" stop-color="#8c0d0d"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafdff"/><stop offset="1" stop-color="#34d6ff"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff27a"/><stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <radialGradient id="rglow" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0" stop-color="#ff2a2a" stop-opacity="0.45"/><stop offset="1" stop-color="#ff2a2a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="620" height="180" fill="#0a0a0c"/>

  <!-- perspective grid floor -->
  <g stroke="#1e3650" stroke-width="1.2" opacity="0.7">
    <line x1="150" y1="150" x2="-40" y2="180"/><line x1="150" y1="150" x2="60" y2="180"/>
    <line x1="150" y1="150" x2="150" y2="180"/><line x1="150" y1="150" x2="240" y2="180"/>
    <line x1="150" y1="150" x2="340" y2="180"/>
    <line x1="10" y1="160" x2="290" y2="160"/><line x1="-20" y1="170" x2="320" y2="170"/>
  </g>

  <!-- emblem: front 944 with pop-ups raised -->
  <g transform="translate(40,18)">
    <ellipse cx="110" cy="100" rx="120" ry="60" fill="url(#rglow)"/>

    <!-- body / fenders (low wide front) -->
    <path d="M8,132 Q4,86 44,82 L66,80 78,58 142,58 154,80 176,82 Q216,86 212,132 L212,140 8,140 Z"
          fill="url(#body)" stroke="#ffb3b3" stroke-opacity="0.25" stroke-width="1"/>
    <!-- greenhouse / windshield -->
    <path d="M80,58 L92,40 128,40 140,58 Z" fill="#0c0f12" stroke="#2a2f36" stroke-width="1"/>
    <!-- lower grille -->
    <rect x="70" y="112" width="80" height="20" rx="4" fill="#0c0d10"/>
    <g stroke="#2c2f35" stroke-width="2"><line x1="78" y1="118" x2="142" y2="118"/><line x1="78" y1="125" x2="142" y2="125"/></g>

    <!-- pop-up headlights RAISED (the hero) + beams -->
    <g filter="url(#glow)">
      <g transform="rotate(-18 60 70)"><rect x="40" y="60" width="40" height="16" rx="3" fill="#1a1d22"/><rect x="40" y="60" width="9" height="16" rx="2" fill="url(#lens)"/></g>
      <g transform="rotate(18 160 70)"><rect x="140" y="60" width="40" height="16" rx="3" fill="#1a1d22"/><rect x="171" y="60" width="9" height="16" rx="2" fill="url(#lens)"/></g>
    </g>
    <g fill="url(#lens)" opacity="0.16"><path d="M40,66 L-6,40 -6,84 Z"/><path d="M180,66 L226,40 226,84 Z"/></g>

    <!-- electric bolt in the grille -->
    <path d="M112,104 L100,124 110,124 106,140 124,116 113,116 Z" fill="url(#bolt)" filter="url(#glow)"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(300,0)">
    <text x="0" y="92" font-size="74" font-weight="800" fill="#f2f2f4" letter-spacing="2">944</text>
    <text x="158" y="92" font-size="74" font-weight="800" fill="url(#bolt)" letter-spacing="1">EV</text>
    <text x="2" y="120" font-size="18" font-weight="700" fill="#34d6ff" letter-spacing="7">ELECTRIC · RESTORED</text>
  </g>
</svg>
