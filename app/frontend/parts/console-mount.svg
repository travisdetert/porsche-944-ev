<svg xmlns="http://www.w3.org/2000/svg" width="360" height="440" viewBox="0 0 360 440">
  <rect width="360" height="440" fill="#f6f6f4"/>
  <text x="180" y="26" font-family="system-ui" font-size="15" font-weight="700" text-anchor="middle" fill="#222">944 Center Stack — Touchscreen Mount</text>

  <!-- center stack outline -->
  <rect x="95" y="50" width="170" height="320" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>

  <!-- upper cubby / vent + cable run -->
  <rect x="112" y="66" width="136" height="40" rx="6" fill="#eef1f4" stroke="#888"/>
  <text x="180" y="91" font-family="system-ui" font-size="11" text-anchor="middle" fill="#666">pocket → vent / cable run</text>

  <!-- the 7" touchscreen (where the radio was) -->
  <rect x="110" y="116" width="140" height="120" rx="8" fill="#0d2b4a" stroke="#1565c0" stroke-width="2.5"/>
  <rect x="120" y="126" width="120" height="100" rx="4" fill="#11385f"/>
  <text x="180" y="172" font-family="system-ui" font-size="13" font-weight="700" text-anchor="middle" fill="#7fd1ff">7&quot; TOUCH</text>
  <text x="180" y="190" font-family="system-ui" font-size="10" text-anchor="middle" fill="#9ec9ee">Pi head-unit app</text>

  <!-- HVAC controls kept below -->
  <rect x="112" y="250" width="136" height="104" rx="6" fill="#eef1f4" stroke="#888"/>
  <text x="180" y="270" font-family="system-ui" font-size="11" text-anchor="middle" fill="#666">HVAC controls — KEPT</text>
  <g stroke="#aaa" stroke-width="3" stroke-linecap="round">
    <line x1="128" y1="290" x2="232" y2="290"/><circle cx="150" cy="290" r="5" fill="#ccc"/>
    <line x1="128" y1="312" x2="232" y2="312"/><circle cx="200" cy="312" r="5" fill="#ccc"/>
    <line x1="128" y1="334" x2="232" y2="334"/><circle cx="170" cy="334" r="5" fill="#ccc"/>
  </g>

  <!-- behind: Pi cage -->
  <rect x="270" y="120" width="70" height="112" rx="6" fill="#fff" stroke="#e67e22" stroke-dasharray="5 3"/>
  <text x="305" y="150" font-family="system-ui" font-size="10" text-anchor="middle" fill="#c2630f">Pi +</text>
  <text x="305" y="164" font-family="system-ui" font-size="10" text-anchor="middle" fill="#c2630f">driver</text>
  <text x="305" y="178" font-family="system-ui" font-size="10" text-anchor="middle" fill="#c2630f">board</text>
  <text x="305" y="200" font-family="system-ui" font-size="9" text-anchor="middle" fill="#999">12V→5V</text>
  <text x="305" y="212" font-family="system-ui" font-size="9" text-anchor="middle" fill="#999">+ CAN</text>
  <line x1="250" y1="176" x2="270" y2="176" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- width note -->
  <line x1="110" y1="408" x2="250" y2="408" stroke="#444" stroke-width="1"/>
  <line x1="110" y1="403" x2="110" y2="413" stroke="#444"/><line x1="250" y1="403" x2="250" y2="413" stroke="#444"/>
  <text x="180" y="426" font-family="system-ui" font-size="11" text-anchor="middle" fill="#444">radio aperture ≈ DIN width (~178 mm) — verify on the car</text>
</svg>
